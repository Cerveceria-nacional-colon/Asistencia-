<script>
// ===== CONFIG =====
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhvMVScpUe_dxIzqJn4t06Ukk2VsMPhINiTZlFsvYTh_Qplfl4b25ql6qEQOd3yf_q/exec';

let records = [];

// ===== JSONP =====
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Math.random().toString(36).substr(2, 9);

    window[callbackName] = (data) => {
      delete window[callbackName];
      document.body.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;

    script.onerror = reject;
    document.body.appendChild(script);
  });
}

// ===== GUARDAR =====
async function saveRec(rec) {
  const url = SCRIPT_URL
    + '?action=add'
    + '&nombre='  + encodeURIComponent(rec.nombre)
    + '&op='      + encodeURIComponent(rec.op)
    + '&estado='  + encodeURIComponent(rec.estado)
    + '&retraso=' + encodeURIComponent(rec.retraso)
    + '&time='    + encodeURIComponent(rec.time)
    + '&date='    + encodeURIComponent(rec.date);

  return await jsonp(url);
}

// ===== CARGAR =====
async function loadRecs() {
  try {
    const data = await jsonp(SCRIPT_URL + '?action=get');

    records = data.reverse();

    renderTable();
    updateStats();
  } catch (e) {
    console.error(e);
    alert('Error cargando datos');
  }
}

// ===== REGISTRAR =====
async function registrar() {
  const nombre = document.getElementById('inputNombre').value.trim();
  const op     = document.getElementById('inputOP').value.trim();

  if (!nombre || !op) {
    alert('Completa los campos');
    return;
  }

  const now = new Date();

  const rec = {
    nombre,
    op: op.toUpperCase(),
    estado: getEstado(now),
    retraso: getRetraso(now),
    time: now.toLocaleTimeString(),
    date: now.toLocaleDateString()
  };

  await saveRec(rec);

  // 🔥 clave: recargar desde sheets real
  await loadRecs();

  alert('Registro guardado correctamente');
}

// ===== ESTADO =====
function getEstado(date) {
  const mins = date.getHours() * 60 + date.getMinutes();
  return mins <= 425 ? 'A tiempo' : 'Tarde';
}

function getRetraso(date) {
  const mins = date.getHours() * 60 + date.getMinutes();
  return Math.max(0, mins - 425);
}

// ===== TABLA =====
function renderTable() {
  const body = document.getElementById('tBody');

  if (!records.length) {
    body.innerHTML = `<tr><td colspan="6">Sin registros</td></tr>`;
    return;
  }

  body.innerHTML = records.map((r, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${r.Nombre}</td>
      <td>${r.OP}</td>
      <td>${r.Hora}</td>
      <td>${r.Estado}</td>
      <td>${r.Fecha}</td>
    </tr>
  `).join('');
}

// ===== STATS =====
function updateStats() {
  document.getElementById('sTotal').textContent = records.length;
}

// ===== INIT =====
window.onload = loadRecs;
</script>
